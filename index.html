<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Story - Beige Theme</title>
    <style>
        :root {
            /* Elegant Beige Palette */
            --bg-top: #fdfbf7;
            --bg-bottom: #eaddca;
            --frame-bg: #ffffff;
            --glow-color: rgba(210, 180, 140, 0.4);
            --text-color: #5c4d3c;
            --spacing: 1rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Flower Petals Animation */
        #flower-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            top: -10%;
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            border-radius: 15px 0 15px 0;
            opacity: 0.7;
            box-shadow: 0 0 10px rgba(248, 187, 208, 0.3);
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(110vh) translateX(50px) rotate(360deg); opacity: 0; }
        }

        /* Controls UI */
        .controls {
            position: absolute;
            top: 2rem;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 1rem;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        button {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(92, 77, 60, 0.2);
            color: var(--text-color);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 5px 15px var(--glow-color);
        }

        /* Cinematic Viewer Layout (3 Rows) */
        .story-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 1;
            padding: 1rem 0;
        }

        .viewer-container {
            width: 100vw;
            overflow: hidden;
        }

        .film-track {
            display: flex;
            gap: var(--spacing);
            width: max-content;
        }

        /* Animation Directions */
        .track-left { animation: scroll-left 35s linear infinite; }
        .track-right { animation: scroll-right 40s linear infinite; }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-50% - (var(--spacing) / 2))); }
        }

        @keyframes scroll-right {
            0% { transform: translateX(calc(-50% - (var(--spacing) / 2))); }
            100% { transform: translateX(0); }
        }

        /* Individual Frame Styling */
        .frame {
            background: var(--frame-bg);
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Adjusted for 3 rows fitting on a phone screen */
        .frame img {
            height: 22vh;
            width: auto;
            object-fit: cover;
            border-radius: 4px;
        }

    </style>
</head>
<body>

    <!-- Animated Flowers Background -->
    <div id="flower-bg"></div>

    <!-- UI Controls -->
    <div class="controls" id="ui-controls">
        <button id="musicBtn">Music</button>
        <button id="hideUiBtn">Hide for Record</button>
    </div>

    <!-- Gallery Area (3 Rows) -->
    <div class="story-container">
        <!-- Row 1 -->
        <div class="viewer-container">
            <div class="film-track track-left" id="filmTrack1"></div>
        </div>
        <!-- Row 2 -->
        <div class="viewer-container">
            <div class="film-track track-right" id="filmTrack2"></div>
        </div>
        <!-- Row 3 -->
        <div class="viewer-container">
            <div class="film-track track-left" id="filmTrack3"></div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- FLOWER ANIMATION LOGIC ---
        function createPetals() {
            const container = document.getElementById('flower-bg');
            for(let i = 0; i < 25; i++) {
                let petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 6 + 6) + 's'; // 6s to 12s
                petal.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(petal);
            }
        }
        createPetals();

        // --- IMAGES CONFIGURATION ---
        const storyImages = [
            { src: 'https://images.unsplash.com/photo-1470770841072-f978c04f4366?auto=format&fit=crop&q=80&w=800' },
            { src: 'https://images.unsplash.com/photo-1418065460487-3e41a6c8e1e3?auto=format&fit=crop&q=80&w=800' },
            { src: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&q=80&w=800' },
            { src: 'https://images.unsplash.com/photo-1506744626753-143d46013a7c?auto=format&fit=crop&q=80&w=800' },
            { src: 'https://images.unsplash.com/photo-1446776811953-b23d5732162e?auto=format&fit=crop&q=80&w=800' }
        ];

        // --- RENDER LOGIC FOR 3 TRACKS ---
        const tracks = [
            document.getElementById('filmTrack1'),
            document.getElementById('filmTrack2'),
            document.getElementById('filmTrack3')
        ];

        tracks.forEach(track => {
            // Shuffle images slightly for each row so they don't look identical
            let shuffled = [...storyImages].sort(() => 0.5 - Math.random());
            let loopingSequence = [...shuffled, ...shuffled, ...shuffled]; // Extra duplicate to ensure smooth scroll

            loopingSequence.forEach(image => {
                const frame = document.createElement('div');
                frame.className = 'frame';
                const imgEl = document.createElement('img');
                imgEl.src = image.src;
                imgEl.loading = "lazy";
                frame.appendChild(imgEl);
                track.appendChild(frame);
            });
        });

        // --- CONTROLS LOGIC ---
        
        // Hide UI for Instagram Recording
        const hideUiBtn = document.getElementById('hideUiBtn');
        const uiControls = document.getElementById('ui-controls');
        
        hideUiBtn.addEventListener('click', () => {
            uiControls.style.opacity = '0';
            // Optional: Bring them back if you tap the screen
            setTimeout(() => {
                uiControls.style.pointerEvents = 'none';
            }, 500);
        });

        // Tap anywhere on background to show UI again
        document.body.addEventListener('click', (e) => {
            if(uiControls.style.opacity === '0') {
                uiControls.style.opacity = '1';
                uiControls.style.pointerEvents = 'auto';
            }
        });

        // Play/Pause Music
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        let isMusicPlaying = false;

        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent triggering the body click
            if (isMusicPlaying) {
                bgMusic.pause();
                musicBtn.textContent = 'Music';
            } else {
                bgMusic.play();
                musicBtn.textContent = 'Pause';
            }
            isMusicPlaying = !isMusicPlaying;
        });
    </script>
</body>
</html>
