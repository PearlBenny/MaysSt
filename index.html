<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Photo Story</title>
    <style>
        :root {
            /* Elegant Black & Soft Brown Palette */
            --bg-dark: #0a0908;
            --bg-brown: #2d1f14;
            --frame-bg: #1c1510;
            --glow-color: rgba(184, 134, 91, 0.5);
            --text-color: #d6c3a5;
            --spacing: 2.5rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-brown) 100%);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden; /* Hide horizontal scrollbar */
        }

        /* Controls UI */
        .controls {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
        }

        button {
            background: rgba(28, 21, 16, 0.7);
            border: 1px solid rgba(214, 195, 165, 0.3);
            color: var(--text-color);
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(214, 195, 165, 0.1);
            border-color: rgba(214, 195, 165, 0.8);
            box-shadow: 0 0 15px var(--glow-color);
        }

        /* Cinematic Viewer Layout */
        .viewer-container {
            width: 100vw;
            overflow: hidden;
            padding: 2rem 0;
            cursor: grab;
        }

        .viewer-container:active {
            cursor: grabbing;
        }

        .film-track {
            display: flex;
            gap: var(--spacing);
            width: max-content;
            /* Animation spans the entire width of the track, moving left */
            animation: scroll-left 40s linear infinite;
        }

        /* Pause animation on hover */
        .viewer-container:hover .film-track {
            animation-play-state: paused;
        }

        /* Individual Frame Styling */
        .frame {
            background: var(--frame-bg);
            padding: 12px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .frame img {
            height: 55vh;
            width: auto;
            object-fit: cover;
            border-radius: 2px;
            pointer-events: none; /* Prevents dragging the image itself */
        }

        .frame:hover {
            transform: scale(1.03) translateY(-10px);
            box-shadow: 0 20px 45px var(--glow-color);
            z-index: 2;
        }

        /* Keyframes for seamless looping */
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-50% - (var(--spacing) / 2))); }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .frame img { height: 45vh; }
        }

        @media (max-width: 768px) {
            .frame img { height: 35vh; }
            .controls {
                bottom: 2rem;
                top: auto;
                right: 50%;
                transform: translateX(50%);
            }
        }
    </style>
</head>
<body>

    <!-- UI Controls -->
    <div class="controls">
        <button id="playPauseBtn">Pause Strip</button>
        <button id="musicBtn">Play Music</button>
    </div>

    <!-- Gallery Area -->
    <div class="viewer-container">
        <div class="film-track" id="filmTrack">
            <!-- Images will be injected here via JavaScript -->
        </div>
    </div>

    <!-- Background Music (Replace src with your preferred ambient track) -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        // --- CONFIGURATION: Easily add/modify your images here ---
        // Using high-quality unsplash placeholders for demonstration
        const storyImages = [
            { src: 'https://images.unsplash.com/photo-1470770841072-f978c04f4366?auto=format&fit=crop&q=80&w=800', alt: 'Cinematic landscape 1' },
            { src: 'https://images.unsplash.com/photo-1418065460487-3e41a6c8e1e3?auto=format&fit=crop&q=80&w=800', alt: 'Cinematic landscape 2' },
            { src: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&q=80&w=800', alt: 'Cinematic landscape 3' },
            { src: 'https://images.unsplash.com/photo-1506744626753-143d46013a7c?auto=format&fit=crop&q=80&w=800', alt: 'Cinematic landscape 4' },
            { src: 'https://images.unsplash.com/photo-1446776811953-b23d5732162e?auto=format&fit=crop&q=80&w=800', alt: 'Cinematic landscape 5' }
        ];

        // --- RENDER LOGIC ---
        const filmTrack = document.getElementById('filmTrack');

        // To create a seamless infinite loop, we duplicate the array exactly once.
        // The CSS animation shifts the container by exactly 50%, snapping back invisibly.
        const loopingSequence = [...storyImages, ...storyImages];

        loopingSequence.forEach(image => {
            // Create Frame
            const frame = document.createElement('div');
            frame.className = 'frame';

            // Create Image Element
            const imgEl = document.createElement('img');
            imgEl.src = image.src;
            imgEl.alt = image.alt;
            imgEl.loading = "lazy"; // Performance optimization

            // Assemble
            frame.appendChild(imgEl);
            filmTrack.appendChild(frame);
        });

        // --- CONTROLS LOGIC ---
        
        // Play/Pause Animation Toggle
        const playPauseBtn = document.getElementById('playPauseBtn');
        let isPlaying = true;

        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                filmTrack.style.animationPlayState = 'paused';
                playPauseBtn.textContent = 'Play Strip';
            } else {
                filmTrack.style.animationPlayState = 'running';
                playPauseBtn.textContent = 'Pause Strip';
            }
            isPlaying = !isPlaying;
        });

        // Play/Pause Music Toggle
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        let isMusicPlaying = false;

        musicBtn.addEventListener('click', () => {
            if (isMusicPlaying) {
                bgMusic.pause();
                musicBtn.textContent = 'Play Music';
            } else {
                bgMusic.play().catch(e => console.log("Audio playback requires user interaction.", e));
                musicBtn.textContent = 'Pause Music';
            }
            isMusicPlaying = !isMusicPlaying;
        });

        // Allow touch interaction to pause on mobile (mimicking hover)
        filmTrack.addEventListener('touchstart', () => {
            if(isPlaying) filmTrack.style.animationPlayState = 'paused';
        });
        filmTrack.addEventListener('touchend', () => {
            if(isPlaying) filmTrack.style.animationPlayState = 'running';
        });
    </script>
</body>
</html>
